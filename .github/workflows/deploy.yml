name: 部署到 GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# 讓 deploy job 有權限發佈 Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 同時間只跑一個部署,新的推送會取代排隊中的舊部署
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          BASE_PATH: /tw-baseball-tracker/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
