name: 每日更新球員數據

on:
  schedule:
    # UTC 22:00 = 台灣早上 6:00(美國比賽多已結束)
    - cron: "0 22 * * *"
  workflow_dispatch: {} # 允許手動觸發,方便測試

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 抓取旅美(MLB)
        run: python3 scripts/fetch_data.py

      - name: 抓取旅日(NPB)
        run: python3 scripts/fetch_npb.py

      - name: 抓取旅韓(KBO)
        run: python3 scripts/fetch_kbo.py

      - name: 合併為 players.json
        run: python3 scripts/build_players.py

      - name: Commit 更新後的 JSON
        run: |
          git config user.name "data-bot"
          git config user.email "actions@github.com"
          git add public/data/*.json
          git diff --cached --quiet || git commit -m "data: update $(date -u +'%Y-%m-%d')"
          git push
